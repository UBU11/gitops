apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: microservices-pipeline
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: git@github.com:UBU11/gitops.git
        revision: HEAD
        directories:
          - path: apps/*
  template:
    metadata:
      name: '{{path.basename}}' 
    spec:
      project: default
      source:
        repoURL: git@github.com:UBU11/gitops.git
        targetRevision: HEAD
        path: '{{path}}' 
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true     
          selfHeal: true 
        syncOptions:
          - CreateNamespace=true
