apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: microservices-pipeline
  namespace: argocd
spec:
  generators:
    # The Git directory generator scans folders in your infra repo
    - git:
        repoURL: https://github.com/your-org/gitops-infra.git
        revision: HEAD
        directories:
          - path: apps/*
  template:
    metadata:
      name: '{{path.basename}}' # Dynamically names the app based on the folder name
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/gitops-infra.git
        targetRevision: HEAD
        path: '{{path}}' # Points precisely to the directory containing kubernetes YAMLs
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true     # Automatically deletes resources removed from Git
          selfHeal: true  # Overwrites manual, out-of-band changes made in the cluster
        syncOptions:
          - CreateNamespace=true
