name: "Continuous Integration Pipeline"

on:
  push:
    branches:
      - main

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout Source Code
        uses: actions/checkout@v7

      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4


      - name: Log into Private Harbor Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_TOKEN }}

      
      - name: Build Application Image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true 
          tags: ${{ secrets.HARBOR_URL }}/production/secure-app:${{ github.sha }}

      # Step II from Blueprint: Scan with Hardened Trivy (Post-Incident Release)
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.HARBOR_URL }}/production/secure-app:${{ github.sha }}
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH' 

      # Step III from Blueprint: Push Clean Image to Harbor (Upgraded to v7)
      - name: Push Secure Image to Harbor
        if: success() 
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/production/secure-app:${{ github.sha }}
            ${{ secrets.HARBOR_URL }}/production/secure-app:latest
