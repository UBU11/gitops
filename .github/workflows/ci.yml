name: CI Build & Scan Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log into Harbor securely using secrets instead of hardcoded strings
      - name: Authenticate with Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.example.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # Build the image locally first so we can scan it before pushing
      - name: Build Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: harbor.example.com/production/my-app:${{ github.sha }}
          load: true # Loads it into the local Docker daemon for analysis

      # Local Trivy check blocks the pipeline before pushing contaminated artifacts
      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: harbor.example.com/production/my-app:${{ github.sha }}
          format: 'table'
          exit-code: '1' # Fails the GitHub Action if issues are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # If the scan passes, safely push the image to your private registry
      - name: Push Container to Harbor
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: harbor.example.com/production/my-app:${{ github.sha }}
          push: true
