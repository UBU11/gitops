name: "Zone 2: Continuous Integration Pipeline"

on:
  push:
    branches:
      - main

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Private Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # Step I from Blueprint: Build Local Container Image
      - name: Build Application Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Loads the image into the local Docker daemon for local scanning
          tags: ${{ secrets.HARBOR_URL }}/production/secure-app:${{ github.sha }}

      # Step II from Blueprint: Scan with Trivy (Vulnerability Gatekeeper)
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.HARBOR_URL }}/production/secure-app:${{ github.sha }}
          format: 'table'
          exit-code: '1' # This forces the GitHub Action to CRASH and fail if vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH' # Blocks push if High or Critical bugs exist

      # Step III from Blueprint: Push Clean Image to Harbor
      - name: Push Secure Image to Harbor
        if: success() # Only runs if the Trivy scanner passed cleanly
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/production/secure-app:${{ github.sha }}
            ${{ secrets.HARBOR_URL }}/production/secure-app:latest
